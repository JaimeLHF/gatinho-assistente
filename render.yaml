databases:
  - name: gatinho-db
    plan: free
    databaseName: gatinho
    user: gatinho

services:
  - type: web
    name: gatinho-api
    runtime: node
    plan: free
    buildCommand: pnpm install && pnpm --filter api prisma:generate && pnpm --filter api build
    startCommand: npx prisma migrate deploy --schema=api/prisma/schema.prisma && node api/dist/server.js
    healthCheckPath: /api/v1/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: gatinho-db
          property: connectionString
      - key: NODE_ENV
        value: production
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        sync: false
      - key: PORT
        value: "3001"

  - type: web
    name: gatinho-web
    runtime: static
    plan: free
    buildCommand: pnpm install && pnpm --filter web build
    staticPublishPath: web/dist
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        sync: false
