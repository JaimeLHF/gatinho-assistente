<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Cat face favicon for Gatinho Pet -->
  <!-- Ears -->
  <polygon points="8,28 16,4 26,24" fill="#D4A574"/>
  <polygon points="56,28 48,4 38,24" fill="#D4A574"/>
  <polygon points="12,26 18,10 24,24" fill="#FFB6C1"/>
  <polygon points="52,26 46,10 40,24" fill="#FFB6C1"/>
  <!-- Head -->
  <ellipse cx="32" cy="38" rx="24" ry="22" fill="#D4A574"/>
  <!-- Eyes -->
  <ellipse cx="22" cy="34" rx="4" ry="5" fill="#FFFFFF"/>
  <ellipse cx="42" cy="34" rx="4" ry="5" fill="#FFFFFF"/>
  <ellipse cx="22" cy="35" rx="2.5" ry="3" fill="#333333"/>
  <ellipse cx="42" cy="35" rx="2.5" ry="3" fill="#333333"/>
