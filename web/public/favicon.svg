  <path d="M29,44 Q32,48 35,44" fill="none" stroke="#8B5E3C" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Whiskers -->
  <line x1="4" y1="38" x2="18" y2="40" stroke="#8B5E3C" stroke-width="1" stroke-linecap="round"/>
  <line x1="4" y1="44" x2="18" y2="43" stroke="#8B5E3C" stroke-width="1" stroke-linecap="round"/>
  <line x1="60" y1="38" x2="46" y2="40" stroke="#8B5E3C" stroke-width="1" stroke-linecap="round"/>
  <line x1="60" y1="44" x2="46" y2="43" stroke="#8B5E3C" stroke-width="1" stroke-linecap="round"/>
</svg>
