x-logging: &default-logging
  logging:
    driver: json-file
    options:
      max-size: "10m"
      max-file: "3"

services:
  postgres:
    image: postgres:17
    restart: unless-stopped
    <<: *default-logging
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: gatinho_pet
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./backups:/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U root -d gatinho_pet"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - internal

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    restart: unless-stopped
    <<: *default-logging
    env_file:
      - api/.env.production
    environment:
      DATABASE_URL: postgresql://root:${POSTGRES_PASSWORD}@postgres:5432/gatinho_pet
      NODE_ENV: production
    volumes:
      - uploads:/app/api/uploads
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal
    stop_grace_period: 15s

  web:
    build:
      context: .
      dockerfile: web/Dockerfile
      args:
        VITE_API_URL: /api/v1
    restart: unless-stopped
    <<: *default-logging
    networks:
      - internal

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    <<: *default-logging
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - uploads:/data/uploads:ro
      - certbot_conf:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot:ro
    depends_on:
      - api
      - web
    networks:
      - internal
    command: "/bin/sh -c 'while :; do sleep 6h & wait $${!}; nginx -s reload; done & nginx -g \"daemon off;\"'"

  certbot:
    image: certbot/certbot
    restart: unless-stopped
    <<: *default-logging
    volumes:
      - certbot_conf:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done'"

volumes:
  pg_data:
  uploads:
  certbot_conf:
  certbot_www:

networks:
  internal:
    driver: bridge
